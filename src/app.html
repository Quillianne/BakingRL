<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BakingRL</title>
    <script>
      (() => {
        try {
          document.documentElement.dataset.theme = localStorage.getItem('bakingrl-theme') || 'modern-dark';
        } catch {
          document.documentElement.dataset.theme = 'modern-dark';
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" style="margin: 0; padding: 0; background-color: var(--bg-dark, #111315); overflow: hidden;">
    <div style="display: contents; margin: 0; padding: 0;">%sveltekit.body%</div>
  </body>
</html>
